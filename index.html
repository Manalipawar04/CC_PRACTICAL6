<!DOCTYPE html>
<html>
<head>
    <title>Percentage Calculator</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:50px;">

    <h2>Percentage Calculator </h2>

    <form method="POST">

        <input type="number" name="m1" placeholder="Subject 1"><br><br>
        <input type="number" name="m2" placeholder="Subject 2"><br><br>
        <input type="number" name="m3" placeholder="Subject 3"><br><br>

        <button type="submit">Calculate</button>
    </form>

    {% if total is not none %}
        <h3>Total: {{ total }}</h3>
        <h3>Percentage: {{ percent | round(2) }}%</h3>
    {% endif %}

</body>
</html>
